  { id: "wingy", name: "Wingy", icon: "eagle", color: "#d4a574" },
  { id: "squid", name: "Squid", icon: "squid", color: "#f9a8d4" },
  { id: "leafy", name: "Leafy", icon: "brachio", color: "#6ee7b7" },
  { id: "sloff", name: "Sloff", icon: "sloth", color: "#d4a574" },
  { id: "bad-atotch", name: "Bad At.Otch", icon: "devil", color: "#ef4444" },
  { id: "dragon", name: "Dragon", icon: "dragon", color: "#34d399" },
  { id: "lava-alien", name: "Lava Alien", icon: "alien", color: "#ff6b35" },
  { id: "bad-yak", name: "Bad Yak", icon: "yak", color: "#a1887f" },
  { id: "mosey", name: "Mosey", icon: "mosasaurus", color: "#38bdf8" },
  { id: "plesio", name: "Plesio", icon: "plesio", color: "#818cf8" },
];
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function StuffieIcon({ item, size = 32 }) {
  const iconFn = Icons[item.icon];
  if (!iconFn) return <span style={{ fontSize: size * 0.8 }}>&#x1f9f8;</span>;
  return iconFn(item.color);
}
function StuffieChip({ item, isSelected, dimmed }) {
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", gap: 4,
      padding: "5px 10px 5px 5px", borderRadius: 999, fontSize: 13,
      fontFamily: "'Space Mono', monospace",
      background: isSelected ? item.color + "18" : "#ffffff06",
      border: "1.5px solid " + (isSelected ? item.color + "66" : "#ffffff12"),
      color: isSelected ? item.color : dimmed ? "#475569" : "#94a3b8",
      transition: "all 0.4s cubic-bezier(.4,0,.2,1)",
      transform: isSelected ? "scale(1.05)" : "scale(1)",
      opacity: dimmed ? 0.35 : 1,
    }}>
      <div style={{ width: 22, height: 22, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ transform: "scale(0.7)", transformOrigin: "center" }}>
          <StuffieIcon item={item} />
        </div>
      </div>
      {item.name}
    </div>
  );
}
function App() {
  const [count, setCount] = useState(7);
  const [selected, setSelected] = useState([]);
  const [isSpinning, setIsSpinning] = useState(false);
  const [isRevealing, setIsRevealing] = useState(false);
  const max = ALL_STUFFIES.length;
  const randomize = useCallback(() => {
    setIsSpinning(true);
    setSelected([]);
    setIsRevealing(false);
    setTimeout(() => {
      const n = Math.min(count, max);
      const picked = shuffle(ALL_STUFFIES).slice(0, n);
      setSelected(picked);
      setIsSpinning(false);
      setIsRevealing(true);
    }, 800);
  }, [count, max]);
  const selectedIds = new Set(selected.map((s) => s.id));
  const hasResults = selected.length > 0;
  return (
    <div style={{ minHeight: "100vh", background: "#0a0e1a", color: "#e2e8f0", fontFamily: "'Space Mono', monospace" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Space+Mono:wght@400;700&display=swap');
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.3) rotate(-10deg); } 100% { opacity: 1; transform: scale(1) rotate(0deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes stars { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.9; } }
        input[type="range"] { -webkit-appearance: none; appearance: none; height: 8px; border-radius: 4px; background: #1e293b; outline: none; width: 100%; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 28px; height: 28px; border-radius: 50%; background: #fbbf24; cursor: pointer; border: 3px solid #0a0e1a; box-shadow: 0 0 10px #fbbf2444; }
        * { box-sizing: border-box; }
      `}</style>
      <div style={{ position: "fixed", inset: 0, overflow: "hidden", pointerEvents: "none", zIndex: 0 }}>
        {Array.from({ length: 35 }).map((_, i) => (
          <div key={i} style={{
            position: "absolute", width: 2 + (i % 3), height: 2 + (i % 3), borderRadius: "50%",
            background: i % 5 === 0 ? "#60a5fa" : "#fbbf24",
            left: ((i * 37 + 13) % 100) + "%", top: ((i * 23 + 7) % 100) + "%",
            animation: "stars " + (2 + (i % 3)) + "s ease-in-out " + ((i * 0.3) % 3) + "s infinite",
          }} />
        ))}
      </div>
      <div style={{ position: "relative", zIndex: 1, maxWidth: 480, margin: "0 auto", padding: "24px 16px 80px" }}>
        <h1 style={{ fontFamily: "'Lilita One', cursive", fontSize: 28, color: "#fbbf24", margin: "0 0 20px 0", textAlign: "center", letterSpacing: 2, animation: "float 4s ease-in-out infinite" }}>
          &#x1f319; Bedtime Buddies
        </h1>
        <div style={{ background: "#111827", border: "2px solid #fbbf2433", borderRadius: 20, padding: "20px 20px 24px", marginBottom: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
            <span style={{ color: "#94a3b8", fontSize: 14 }}>How many tonight?</span>
            <span style={{ color: "#fbbf24", fontFamily: "'Lilita One', cursive", fontSize: 36 }}>{count}</span>
          </div>
          <input type="range" min={1} max={max} value={count} onChange={(e) => setCount(Number(e.target.value))} style={{ marginBottom: 20 }} />
          <div style={{ display: "flex", gap: 8, justifyContent: "space-between", marginBottom: 20 }}>
            {[3, 5, 7, 10, max].map((n) => (
              <button key={n} onClick={() => setCount(n)} style={{
                flex: 1, padding: "8px 0", borderRadius: 10,
                border: count === n ? "2px solid #fbbf24" : "2px solid #1e293b",
                background: count === n ? "#fbbf2418" : "#0f172a",
                color: count === n ? "#fbbf24" : "#64748b",
                fontFamily: "'Lilita One', cursive", fontSize: 16, cursor: "pointer", transition: "all 0.2s",
              }}>
                {n === max ? "ALL" : n}
              </button>
            ))}
          </div>
          <button onClick={randomize} disabled={isSpinning} style={{
            width: "100%", fontFamily: "'Lilita One', cursive", fontSize: 22, letterSpacing: 2,
            padding: "16px 0", borderRadius: 14, border: "none",
            cursor: isSpinning ? "not-allowed" : "pointer", color: "#0a0e1a",
            background: isSpinning ? "linear-gradient(90deg, #fbbf24, #f59e0b, #fbbf24, #f59e0b)" : "linear-gradient(135deg, #fbbf24, #f59e0b)",
            backgroundSize: isSpinning ? "300% 100%" : "100% 100%",
            animation: isSpinning ? "shimmer 0.8s linear infinite" : "none",
            boxShadow: "0 4px 24px #fbbf2433", transition: "all 0.3s ease",
          }}>
            {isSpinning ? "\u2728 Picking... \u2728" : "\uD83C\uDFB2 Randomize!"}
          </button>
        </div>
        {hasResults && (
          <div style={{ background: "linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #1a2e05 100%)", borderRadius: 20, border: "2px solid #fbbf2433", padding: "20px 16px", marginBottom: 20 }}>
            <h2 style={{ margin: "0 0 16px 0", textAlign: "center", fontFamily: "'Lilita One', cursive", fontSize: 20, color: "#fbbf24", letterSpacing: 1 }}>
              Tonight's Crew
            </h2>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10, justifyContent: "center" }}>
              {selected.map((item, i) => (
                <div key={item.id} style={{
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                  padding: "10px 12px 8px", borderRadius: 14,
                  background: item.color + "0a", border: "1.5px solid " + item.color + "44",
                  minWidth: 76,
                  animation: isRevealing ? "popIn 0.45s cubic-bezier(.34,1.56,.64,1) " + (i * 0.07) + "s both" : "none",
                }}>
                  <StuffieIcon item={item} />
                  <span style={{ fontSize: 11, fontFamily: "'Space Mono', monospace", color: item.color, textAlign: "center", fontWeight: 600, lineHeight: 1.3, maxWidth: 90 }}>
                    {item.name}
                  </span>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{ background: "#111827", borderRadius: 16, padding: "16px", border: "1px solid #1e293b" }}>
          <h3 style={{ margin: "0 0 12px 0", fontFamily: "'Lilita One', cursive", fontSize: 15, color: "#64748b", letterSpacing: 1 }}>
            Full Roster ({max})
          </h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {ALL_STUFFIES.map((item) => (
              <StuffieChip key={item.id} item={item} isSelected={selectedIds.has(item.id)} dimmed={hasResults && !selectedIds.has(item.id)} />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
